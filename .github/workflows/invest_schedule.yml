name: Daily Investment Manager

on:
  schedule:
    # 한국 시간 오후 7시 (월~금)
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Node.js 24 대응

      - name: Set up Python
        uses: actions/setup-python@v5 # Node.js 24 대응
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run Manager Script
        env:
          # GitHub Secrets의 이름과 일치시켰습니다.
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_PW: ${{ secrets.NAVER_PW }}
        run: python investment_manager.py
