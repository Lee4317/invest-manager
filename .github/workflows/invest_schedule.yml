name: Daily Investment Manager

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run Manager Script
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_PW: ${{ secrets.NAVER_PW }}
          # [핵심] 서버 환경 자체를 UTF-8로 강제 설정
          PYTHONIOENCODING: utf-8
          LANG: ko_KR.UTF-8
          LC_ALL: ko_KR.UTF-8
        run: python investment_manager.py
